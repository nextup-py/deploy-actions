name: Reusable Laravel Deploy

on:
  workflow_call:
    inputs:
      environment_name:
        type: string
        required: true
      run_tests:
        type: boolean
        default: true
      run_migrations:
        type: boolean
        default: true
      php_version:
        type: string
        default: '8.3'
      node_version:
        type: string
        default: '22'
    secrets:
      SSH_HOST:
        required: true
      SSH_PORT:
        required: true
      SSH_USER:
        required: true
      SSH_PRIVATE_KEY:
        required: true
      DEPLOY_PATH:
        required: true
      APP_URL:
        required: true
      SMTP_HOST:
        required: true
      SMTP_PORT:
        required: true
      SMTP_USER:
        required: true
      SMTP_PASS:
        required: true
      NOTIFY_EMAIL:
        required: true

jobs:
  test:
    if: ${{ inputs.run_tests }}
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php_version }}
          extensions: mbstring, dom, fileinfo, mysql
          coverage: none
      - run: cp .env.example .env
      - run: composer install --no-interaction --prefer-dist --optimize-autoloader
      - run: php artisan key:generate
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node_version }}
      - run: npm ci
      - run: npm run build
      - name: Run migrations
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: secret
        run: php artisan migrate --force
      - name: Run tests (Pest)
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: secret
        run: php artisan test

  deploy:
    needs: [test]
    if: |
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    concurrency:
      group: deploy-${{ inputs.environment_name }}
      cancel-in-progress: false
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            set -o pipefail

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            cd "$DEPLOY_PATH"

            PREV_SHA=$(git rev-parse HEAD)
            LOG="$DEPLOY_PATH/storage/logs/deploy.log"
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] === Deploy started (prev SHA: ${PREV_SHA:0:8}) ===" >> "$LOG"

            rollback() {
              echo "[$(date '+%H:%M:%S')] Step failed — rolling back to ${PREV_SHA:0:8}" >> "$LOG"
              git reset --hard "$PREV_SHA"
              php artisan up || true
              echo "[$(date '+%H:%M:%S')] === Deploy FAILED ===" >> "$LOG"
              exit 1
            }
            trap rollback ERR

            php artisan down 2>&1 | tee -a "$LOG" || true
            git pull origin main 2>&1 | tee -a "$LOG"
            composer install --no-dev --optimize-autoloader 2>&1 | tee -a "$LOG"
            php artisan storage:link 2>&1 | tee -a "$LOG"
            npm ci 2>&1 | tee -a "$LOG"
            "$DEPLOY_PATH/node_modules/.bin/vite" build 2>&1 | tee -a "$LOG"

            if [ "${{ inputs.run_migrations }}" = "true" ]; then
              DB_HOST=$(grep '^DB_HOST=' .env | cut -d '=' -f2)
              DB_PORT=$(grep '^DB_PORT=' .env | cut -d '=' -f2)
              DB_DATABASE=$(grep '^DB_DATABASE=' .env | cut -d '=' -f2)
              DB_USERNAME=$(grep '^DB_USERNAME=' .env | cut -d '=' -f2)
              DB_PASSWORD=$(grep '^DB_PASSWORD=' .env | cut -d '=' -f2)
              BACKUP_DIR="$DEPLOY_PATH/storage/backups"
              mkdir -p "$BACKUP_DIR"
              BACKUP_FILE="$BACKUP_DIR/db_$(date +%Y-%m-%d_%H-%M-%S).sql.gz"
              mysqldump --host="$DB_HOST" --port="${DB_PORT:-3306}" --user="$DB_USERNAME" --password="$DB_PASSWORD" \
                --single-transaction --quick "$DB_DATABASE" | gzip > "$BACKUP_FILE"
              echo "Backup OK: $BACKUP_FILE" | tee -a "$LOG"

              ls -1t "$BACKUP_DIR"/db_*.sql.gz | tail -n +8 | xargs -r rm -f

              php artisan migrate --force 2>&1 | tee -a "$LOG"
            fi

            php artisan livewire:publish --assets 2>&1 | tee -a "$LOG"
            php artisan filament:assets 2>&1 | tee -a "$LOG"
            php artisan optimize:clear 2>&1 | tee -a "$LOG"
            php artisan optimize 2>&1 | tee -a "$LOG"
            php artisan filament:optimize 2>&1 | tee -a "$LOG"
            php artisan queue:restart 2>&1 | tee -a "$LOG"
            php artisan up 2>&1 | tee -a "$LOG"

            trap - ERR
            echo "[$(date '+%H:%M:%S')] === Deploy OK ===" >> "$LOG"

      - name: Health check
        run: |
          echo "Waiting 10s for app to warm up..."
          sleep 10
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 --location "${{ secrets.APP_URL }}")
          echo "Health check status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ge 500 ]; then
            echo "Health check failed - HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "App is up and responding correctly."

      - name: Notify deploy failure by email
        if: failure()
        uses: dawidd6/action-send-mail@v5
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          from: ${{ secrets.SMTP_USER }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          subject: "❌ Deploy falló: ${{ inputs.environment_name }}"
          body: |
            El deploy de "${{ inputs.environment_name }}" falló.

            Commit intentado: ${{ github.sha }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Revisá storage/logs/deploy.log en el servidor para el detalle del paso que falló.

  tag:
    needs: [deploy]
    if: needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Create and push release tag
        run: |
          set -e
          TAG="prod-$(date +%Y-%m-%d_%H%M)"
          git tag "$TAG"
          git push origin "$TAG"
